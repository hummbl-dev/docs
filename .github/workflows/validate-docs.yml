name: Validate Docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate docs.json page references
        run: python3 scripts/validate_docs.py

      - name: Check for stale quantitative claims
        run: python3 scripts/check_claims.py
